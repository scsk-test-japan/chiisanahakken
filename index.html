<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>きょうの、ちいさな発見</title>
<style>
  :root{
    --paper:#F6F3EC; --surface:#FFFFFF; --ink:#232B36; --inkSoft:#5A6573;
    --line:#E6E1D6; --accent:#2F7E68; --accentSoft:#E4EFEA; --accentDeep:#246154;
    --amber:#C9803A; --user:#2B3543;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
    display:flex;justify-content:center;padding:32px 16px;min-height:100vh}
  .wrap{width:100%;max-width:680px}
  .eyebrow{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:24px;margin:0}
  .sub{color:var(--inkSoft);font-size:14px;margin:4px 0 0;line-height:1.6}

  /* はじめに（立場）バー */
  .rolebar{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-top:16px}
  .rolebar summary{cursor:pointer;color:var(--accentDeep);font-size:13px;font-weight:600;list-style:none}
  .rolebar summary::-webkit-details-marker{display:none}
  .rolebar summary::before{content:"▸ ";color:var(--accent)}
  .rolebar[open] summary::before{content:"▾ "}
  .roleinner{margin-top:12px;display:flex;flex-direction:column;gap:12px}
  .rlabel{color:var(--inkSoft);font-size:12px;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;user-select:none}
  .chip.on{background:var(--accentSoft);border-color:var(--accent);color:var(--accentDeep);font-weight:600}
  .rolebar select{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden;margin-top:16px}
  #chat{padding:20px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:10px;align-items:flex-start}
  .row.user{justify-content:flex-end}
  .ava{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--accentSoft);
    color:var(--accentDeep);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px}
  .bubble{border-radius:16px;padding:10px 16px;font-size:14px;line-height:1.65;max-width:85%;white-space:pre-wrap;word-break:break-word}
  .ai .bubble{background:var(--accentSoft);border-top-left-radius:4px}
  .user .bubble{background:var(--user);color:#F4F6F8;border-top-right-radius:4px}
  .typing{color:var(--inkSoft);font-size:14px;font-style:italic}
  .inputbar{border-top:1px solid var(--line);padding:12px 16px}
  .inputrow{display:flex;gap:8px;align-items:flex-end}
  textarea{font-family:inherit}
  #msg{flex:1;resize:vertical;min-height:110px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;
    font-size:14px;line-height:1.6;outline:none}
  #msg:focus{box-shadow:0 0 0 2px var(--accentSoft)}
  .btn{border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:disabled{background:var(--line);color:var(--inkSoft);cursor:default}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--inkSoft)}
  .btn.outline{background:transparent;border:1px solid var(--accent);color:var(--accentDeep)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:0 2px}
  .meta span{color:var(--inkSoft);font-size:12px}
  .link{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .link:disabled{opacity:.4;cursor:default}
  .err{color:var(--amber);font-size:14px;text-align:center;margin-top:12px}

  .reshead{background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:12px 20px}
  .resbody{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
  .flabel{color:var(--accent);font-size:12px;font-weight:700;margin-bottom:4px}
  .fval{font-size:14px;line-height:1.65;color:#3a4452;margin:0}
  .fval.strong{font-size:16px;font-weight:500;color:var(--ink)}

  /* 推定内容の確認・編集 */
  .review{border-top:1px solid var(--line)}
  .review summary{cursor:pointer;padding:14px 20px;font-size:13px;font-weight:600;color:var(--accentDeep);list-style:none;background:var(--paper)}
  .review summary::-webkit-details-marker{display:none}
  .review summary::before{content:"▸ ";color:var(--accent)}
  .review[open] summary::before{content:"▾ "}
  .reviewbody{padding:8px 20px 16px;display:flex;flex-direction:column;gap:14px}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld > label{font-size:12px;color:var(--inkSoft);line-height:1.5}
  .est{font-size:10px;font-weight:700;color:var(--amber);margin-left:6px}
  .fld select,.fld input,.fld textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff}
  .cbs{display:flex;flex-wrap:wrap;gap:6px}
  .cb{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer}
  .cb.on{background:var(--accentSoft);border-color:var(--accent);color:var(--accentDeep);font-weight:600}
  .cb input{display:none}

  .actions{border-top:1px solid var(--line);background:var(--paper);padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px}
  .ml-auto{margin-left:auto}
  /* 見やすいサマリー */
  .summary{border-top:1px solid var(--line);padding:6px 20px 8px}
  .ssection{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;padding:16px 0 6px;border-bottom:1px solid var(--accentSoft);margin-bottom:2px}
  .srow{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);align-items:start}
  .srow:last-child{border-bottom:none}
  .skey{font-size:11px;color:var(--inkSoft);font-weight:700;line-height:1.55;padding-top:3px}
  .sval{font-size:14px;color:var(--ink);line-height:1.6}
  .sval.empty{color:#B4B0A6}
  .sbadge{display:inline-block;font-size:9px;font-weight:700;color:var(--amber);border:1px solid var(--amber);border-radius:6px;padding:0 4px;margin-left:6px;vertical-align:middle;line-height:1.6}
  .pill{display:inline-block;background:var(--accentSoft);color:var(--accentDeep);border-radius:999px;padding:3px 11px;font-size:12px;font-weight:600;margin:2px 5px 2px 0}
  .copyarea{border-top:1px solid var(--line);padding:0}
  .copyarea > summary{cursor:pointer;padding:14px 20px;font-size:13px;font-weight:600;color:var(--accentDeep);list-style:none;background:var(--paper)}
  .copyarea > summary::-webkit-details-marker{display:none}
  .copyarea > summary::before{content:"▸ ";color:var(--accent)}
  .copyarea[open] > summary::before{content:"▾ "}
  .copyinner{padding:8px 20px 16px}
  .copyarea .hint{color:var(--inkSoft);font-size:12px;margin-bottom:6px}
  .out{width:100%;border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin:0 0 12px;
    font-size:12px;line-height:1.6;font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--paper);color:var(--ink);
    white-space:pre-wrap;word-break:break-word;user-select:text;-webkit-user-select:text}
  .foot{color:var(--inkSoft);font-size:11px;text-align:center;margin-top:20px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    font-size:13px;padding:10px 18px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">現場の気づきメモ</div>
    <h1>きょうの、ちいさな発見</h1>
    <p class="sub">会話するだけでOK。うまくまとめようとしなくて大丈夫です。</p>
  </header>

  <!-- はじめに：立場（1回だけ・任意） -->
  <details class="rolebar" id="rolebar">
    <summary>はじめに、あなたの立場を教えてください（任意・最初の1回だけ）</summary>
    <div class="roleinner">
      <div>
        <div class="rlabel">職務（複数選択可）</div>
        <div class="chips" id="jobChips"></div>
      </div>
      <div>
        <div class="rlabel">普段の業務で主に関わっている相手・対象（1つ）</div>
        <select id="counterpart"><option value="">選択してください</option></select>
      </div>
    </div>
  </details>

  <div class="card">
    <div id="chat"></div>
    <div class="inputbar" id="inputbar">
      <div class="inputrow">
        <textarea id="msg" rows="5" placeholder="ここに入力（Enterで送信 / Shift+Enterで改行）"></textarea>
        <button class="btn primary" id="send">送信</button>
      </div>
      <div class="meta">
        <span>「特になし」でも大丈夫です</span>
        <button class="link" id="finishLink">もう十分／まとめる →</button>
      </div>
    </div>
  </div>

  <div class="err" id="err" style="display:none"></div>
  <div class="card" id="result" style="display:none"></div>

  <p class="foot">入力内容は要約・分類のためにAIで処理されます。</p>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== 設定：ここだけ書き換える ===== */
var GAS_URL = "https://script.google.com/macros/s/AKfycby-XFAiDsf6BJ04CsEp1v0JoDN0pKCCA8HX7Tf9aKnRALzQANkdrk1uV03hYgMACUM/exec";
var ACCESS_TOKEN = "SIP2026"; // GASのACCESS_TOKENを設定した場合のみ同じ合言葉を入れる
var ENABLE_SHEET_APPEND = true; // GAS側に append ハンドラを追加したら true のまま。未対応ならボタンはエラー表示になるだけ
/* =================================== */

/* ▼ 職務・関わる相手の選択肢は「実際のFormsの選択肢」に置き換えてください（サンプル値です） */
var JOB_OPT = ["営業","企画","開発","運用・保守","コンサル・PM","スタッフ・管理部門","その他"];
var COUNTERPART_OPT = [
  "金融機関（銀行、保険、証券など）の担当者",
  "金融機関の利用者・エンドユーザー",
  "社内メンバー","他部署","協力会社・パートナー","その他"
];

/* ▼ 各設問の選択肢（Forms準拠）。単一＝SINGLE、複数＝MULTI */
var SINGLE = {
  state:["うまくいっている状態","やりづらさを感じた状態","どちらの要素もある","判断が難しい"],
  timing:["日常的に発生している","月次・定期処理のタイミング","繁忙期","システムリリース・更改の前後","制度改正・ルール変更のタイミング","トラブル・障害発生時","特定の条件・イベントのとき","分からない"],
  frequency:["ほぼ毎日","週に数回〜毎週","月に数回〜毎月","たまに見かける","分からない"],
  elsewhere:["よく起きていそう（どこでもよく起きていそう）","一部で起きていそう（いくつかのケースで起きていそう）","限定的に起きていそう（このケースに限られそう）","分からない"],
  scene:["顧客とのやり取りの中で","顧客とエンドユーザーのやり取りに関する内容で","社内メンバーとの連携の中で","他部署とのやり取りの中で","システムの操作や処理の中で","業務の手順や作業の中で","分からない"],
  domain_known:["分かる","分からない"],
  how:["自分の対応の中で、実際に見た（直接確認した）","顧客から直接聞いた","社内メンバーから聞いた","会話や打ち合わせの中で把握した","資料やデータを見て把握した","振り返りや整理の中で気づいた"]
};
var MULTI = {
  domains:["業務運用（定常業務・オペレーション）","顧客接点（営業・問い合わせなど）","勘定系システム","周辺システム","データ・情報連携","プロジェクト（開発・更改など）","制度対応・監査","組織・運営"],
  factors:["業務の進め方や手順","システム・ツールの機能や使い方","データ・情報の扱い","スキルやナレッジの共有","関係者とのやり取り・連携","確認や品質の保ち方","ルールや制度との関係","体制や役割分担","分からない"],
  values:["利用者にとっての使いやすさや利便性の向上（利用者価値）","業務や企業の生産性向上（業務効率・生産性）","デジタル化や業務の高度化（業務改革・DX）","安全性・セキュリティの向上（安全・安心）","サービスの質や信頼性の向上（品質・信頼）","人材育成や働き方の変化（組織・人材）","社会課題（地域・高齢化など）の解決（社会価値）","他のお客様にも展開できそうなサービス・支援につながる","まだイメージできない"]
};

/* 画面表示用ラベル（スプレッドシート列順） */
var FIELDS = [
  {key:"fact",       label:"ファクト（事実）",                  type:"text",   req:true,  ask:true},
  {key:"state",      label:"うまくいっている／やりづらさ",       type:"single", req:true,  ask:false},
  {key:"timing",     label:"どのようなタイミングで起きているか", type:"single", req:true,  ask:true},
  {key:"frequency",  label:"どのくらいの頻度で見かけるか",       type:"single", req:true,  ask:true},
  {key:"elsewhere",  label:"他の現場でも起きていそうか",         type:"single", req:false, ask:false},
  {key:"scene",      label:"主にどの場面で起きているか",         type:"single", req:false, ask:false},
  {key:"domain_known",label:"業務領域・仕組みが分かるか",         type:"single", req:false, ask:false},
  {key:"domains",    label:"どの業務領域・仕組みの中で",         type:"multi",  req:false, ask:false},
  {key:"dept",       label:"分かりそうな部署・担当",             type:"text",   req:false, ask:false},
  {key:"factors",    label:"関係していそうなもの",               type:"multi",  req:false, ask:false},
  {key:"values",     label:"つながりそうな価値（最大3）",         type:"multi",  req:false, ask:false},
  {key:"how",        label:"どのように把握したか",               type:"single", req:true,  ask:true},
  {key:"insight",    label:"感じたこと・気づき",                 type:"text",   req:true,  ask:true}
];

var CHAT_SYSTEM = [
"あなたは、現場で働く社員から「業務上の気づき・ファクト（事実）」を対話でやさしく引き出すインタビュアーです。相手が身構えず、普段の言葉で話せる雰囲気を作ってください。",
"",
"【話し方のルール】",
"- 質問は必ず一度に1つだけ。返答は1〜2文。専門用語や堅い言葉は避け、敬語でフレンドリーに。",
"- まず相手の発言を短く受け止める（共感・労いを1文）。大げさにしない。",
"- 分類の選択肢や設問番号を相手に見せたり読み上げたりしない。あくまで自然な雑談として聞く。",
"- 相手が「特になし」「分からない」「これだけです」等と言ったら深追いせず、受け止めて次へ／締める。同じ話題を3回以上深掘りしない。",
"- 1回のセッションでは原則1つのファクトに集中する。",
"",
"【会話の中でさりげなく確かめたいこと（順不同・自然な流れで。全部を無理に聞かない）】",
"1. その事実は具体的に何か（誰が・何をして・どうなっているか）。抽象的なら1〜2回だけ具体例を促す。",
"2. それはどんな時に起きるか（きっかけ・タイミング）、どのくらいの頻度で見かけるか。",
"3. その事実をどうやって知ったか（自分で見た／顧客や社内から聞いた等）。",
"4. 最後に、本人が感じたこと・気づきを一言。",
"※『他の現場でも起きそうか』『どんな価値につながるか』などは会話では聞かず、こちらで推測します。無理に質問しないでください。",
"",
"【締め方】",
"締めるのは、上記1〜4がだいたい把握できたときだけ。締めるターンでは新しい質問を絶対にしない。相手への感謝と、話してくれた内容を1文で受け止めるお礼だけを述べて、気持ちよく会話を終える。",
"そのお礼メッセージの“最末尾”にのみ、半角で __DONE__ と付ける（内部信号。質問文には絶対に付けない。文中の他の場所でも使わない）。",
"逆に、まだ質問を続けたい・情報が足りないターンでは、__DONE__ を出さず、普通に1つだけ質問する。質問と __DONE__ を同じターンに混在させないこと。"
].join("\n");

function finalizeSystem(){
  function list(a){return a.map(function(x){return "「"+x+"」";}).join("、");}
  return [
"次に渡す対話履歴を読み取り、下記スキーマのJSONだけを出力してください。前置き・後置き・説明・コードフェンス・改行装飾は一切不要。JSONオブジェクトのみ。値はすべて日本語。",
"会話に明確な根拠がある項目はそれを使い、無い項目も文脈から直感で推定してください（このアンケートは直感回答を許容します）。単一選択は必ず候補から1つだけ選ぶ。複数選択は該当を配列で（0個も可）。候補にうまく当てはまらない場合のみ、その項目に短い自由記述の文字列を入れてよい（valuesは最大3件）。",
"必須項目 fact / state / timing / frequency / how / insight は、判断材料が乏しくても最も妥当な値を必ず入れる（frequency等は「分からない」でも可）。",
"また est 配列に、会話に直接の根拠がなく“推定”で埋めた項目キーを列挙する（例: [\"elsewhere\",\"values\"]）。",
"",
"スキーマ:",
"{",
'  "fact": "事実の要約（1〜2文、誰が・何をして・どうなっているか）",',
'  "state": '+list(SINGLE.state)+" のいずれか1つ,",
'  "timing": '+list(SINGLE.timing)+" のいずれか1つ（該当なければ具体的な状況の短い記述）,",
'  "frequency": '+list(SINGLE.frequency)+" のいずれか1つ,",
'  "elsewhere": '+list(SINGLE.elsewhere)+" のいずれか1つ,",
'  "scene": '+list(SINGLE.scene)+" のいずれか1つ（該当なければ短い記述）,",
'  "domain_known": "分かる または 分からない",',
'  "domains": ['+list(MULTI.domains)+" から該当を配列で（該当なければ空配列）],",
'  "dept": "分かりそうな部署・担当があれば（無ければ空文字）",',
'  "factors": ['+list(MULTI.factors)+" から該当を配列で],",
'  "values": ['+list(MULTI.values)+" から最大3件],",
'  "how": '+list(SINGLE.how)+" のいずれか1つ（該当なければ短い記述）,",
'  "insight": "本人の気づき・感想（一言でも可、無ければ「特になし」）",',
'  "est": ["推定で埋めた項目キーの配列"]',
"}"
  ].join("\n");
}

var GREETING = "こんにちは。最近の業務で「あれ？」と思ったことや、ちょっとした気づき・困りごとを聞かせてください。うまくまとめなくて大丈夫です。まずは、どんなことでも一言からどうぞ。";

var messages = [{role:"assistant", content:GREETING}];
var done = false, result = null;
var role = loadRole();

var chatEl=document.getElementById("chat"), msgEl=document.getElementById("msg"),
    sendBtn=document.getElementById("send"), finishLink=document.getElementById("finishLink"),
    inputbar=document.getElementById("inputbar"), errEl=document.getElementById("err"),
    resultEl=document.getElementById("result"), toastEl=document.getElementById("toast");

function esc(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function toast(t){toastEl.textContent=t;toastEl.classList.add("show");setTimeout(function(){toastEl.classList.remove("show");},1600);}

/* ---------- 立場（職務・相手）: localStorage 保存 ---------- */
function loadRole(){try{return JSON.parse(localStorage.getItem("hakken_role"))||{job:[],counterpart:""};}catch(e){return{job:[],counterpart:""};}}
function saveRole(){try{localStorage.setItem("hakken_role",JSON.stringify(role));}catch(e){}}
function initRole(){
  var jc=document.getElementById("jobChips");
  jc.innerHTML=JOB_OPT.map(function(o){
    var on=role.job.indexOf(o)>=0?" on":"";
    return '<span class="chip'+on+'" data-v="'+esc(o)+'">'+esc(o)+'</span>';
  }).join("");
  jc.querySelectorAll(".chip").forEach(function(el){
    el.onclick=function(){var v=el.getAttribute("data-v");var i=role.job.indexOf(v);
      if(i>=0){role.job.splice(i,1);el.classList.remove("on");}else{role.job.push(v);el.classList.add("on");}saveRole();};
  });
  var cp=document.getElementById("counterpart");
  cp.innerHTML='<option value="">選択してください</option>'+COUNTERPART_OPT.map(function(o){
    return '<option'+(role.counterpart===o?" selected":"")+'>'+esc(o)+'</option>';}).join("");
  cp.onchange=function(){role.counterpart=cp.value;saveRole();};
  if(role.job.length||role.counterpart) document.getElementById("rolebar").open=false;
}

/* ---------- チャット描画 ---------- */
function renderChat(){
  chatEl.innerHTML=messages.map(function(m){
    if(m.role==="assistant") return '<div class="row ai"><div class="ava">AI</div><div class="bubble">'+esc(m.content)+'</div></div>';
    return '<div class="row user"><div class="bubble">'+esc(m.content)+'</div></div>';
  }).join("");
  scrollLatest();
}
function scrollLatest(){var l=chatEl.lastElementChild;if(l)l.scrollIntoView({behavior:"smooth",block:"nearest"});}
function showTyping(label){var d=document.createElement("div");d.className="row ai";d.id="typing";
  d.innerHTML='<div class="ava">AI</div><div class="typing">'+label+'</div>';chatEl.appendChild(d);scrollLatest();}
function hideTyping(){var t=document.getElementById("typing");if(t)t.remove();}
function showErr(t){errEl.textContent=t;errEl.style.display=t?"block":"none";}

/* ---------- GAS 経由で Gemini を呼ぶ ---------- */
function callAPI(mode, system, msgs){
  return fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({mode:mode,system:system,messages:msgs,token:ACCESS_TOKEN})})
    .then(function(r){return r.json();}).then(function(d){if(d.error)throw new Error(d.error);return (d.text||"").trim();});
}

function send(){
  var text=msgEl.value.trim(); if(!text||done) return;
  showErr(""); messages.push({role:"user",content:text}); msgEl.value=""; renderChat();
  sendBtn.disabled=true; showTyping("考えています…");
  callAPI("chat",CHAT_SYSTEM,messages.map(function(m){return {role:m.role,content:m.content};}))
    .then(function(reply){
      hideTyping();
      var isDone=reply.indexOf("__DONE__")>=0;
      messages.push({role:"assistant",content:reply.replace(/__DONE__/g,"").trim()});
      renderChat(); if(isDone) enterDone();
      sendBtn.disabled=false; msgEl.focus();
    }).catch(function(e){hideTyping();sendBtn.disabled=false;
      showErr("通信に失敗しました（"+e.message+"）。少し待って再度お試しください。");});
}

function enterDone(){
  done=true;
  inputbar.innerHTML='<div style="text-align:center;padding:8px 0">'+
    '<p class="sub" style="margin-bottom:12px">お話ありがとうございました。内容をデータにまとめます。</p>'+
    '<button class="btn primary" id="makeBtn">まとめを作成する</button></div>';
  document.getElementById("makeBtn").onclick=finalize;
}

function finalize(){
  showErr("");
  var mk=document.getElementById("makeBtn"); if(mk){mk.disabled=true;mk.textContent="まとめています…";}
  showTyping("まとめています…");
  var transcript=messages.map(function(m){return (m.role==="user"?"ユーザー: ":"AI: ")+m.content;}).join("\n");
  callAPI("finalize",finalizeSystem(),[{role:"user",content:transcript}])
    .then(function(raw){
      hideTyping();
      var s=raw.indexOf("{"),e=raw.lastIndexOf("}");
      result=normalize(JSON.parse(raw.slice(s,e+1)));
      renderResult();
    }).catch(function(err){hideTyping();
      if(mk){mk.disabled=false;mk.textContent="まとめを作成する";}
      showErr("まとめの生成に失敗しました（"+err.message+"）。もう一度お試しください。");});
}

/* 欠損補完 */
function normalize(r){
  r=r||{}; r.est=r.est||[];
  ["fact","dept","insight","state","timing","frequency","elsewhere","scene","domain_known","how"]
    .forEach(function(k){if(typeof r[k]!=="string")r[k]=r[k]==null?"":String(r[k]);});
  ["domains","factors","values"].forEach(function(k){if(!Array.isArray(r[k]))r[k]=r[k]?[String(r[k])]:[];});
  if(r.values.length>3) r.values=r.values.slice(0,3);
  return r;
}

/* ---------- 結果 ＋ 確認・編集 ---------- */
function renderResult(){
  if(done) inputbar.style.display="none";
  resultEl.style.display="block";
  resultEl.innerHTML=
    '<div class="reshead">まとまりました</div>'+
    '<div class="resbody">'+
      '<div><div class="flabel">ファクト（事実）</div><p class="fval strong" id="v_fact">'+esc(result.fact||"—")+'</p></div>'+
      '<div><div class="flabel">あなたの気づき</div><p class="fval" id="v_insight">'+esc(result.insight||"—")+'</p></div>'+
    '</div>'+
    '<details class="review" id="review"><summary>推定した内容を確認・修正する（任意・そのまま送信でもOK）</summary>'+
      '<div class="reviewbody" id="reviewBody"></div></details>'+
    '<div class="summary" id="summary"></div>'+
    '<div class="actions">'+
      (ENABLE_SHEET_APPEND?'<button class="btn primary" id="appendBtn">スプレッドシートに反映</button>':'')+
      '<button class="btn outline" id="copyRow">1行コピー（スプレッドシート用）</button>'+
      '<button class="btn ghost" id="copyForms">Forms用テキストをコピー</button>'+
      '<button class="btn ghost ml-auto" id="resetBtn">別のファクトを追加</button>'+
    '</div>'+
    '<details class="copyarea" id="copyarea"><summary>コピー用の生テキストを表示（手動貼り付け用）</summary>'+
    '<div class="copyinner">'+
      '<div class="hint">スプレッドシート1行（タブ区切り）。枠内をタップ→全選択でコピー。</div>'+
      '<pre class="out" id="outRow"></pre>'+
      '<div class="hint">Forms用テキスト。</div>'+
      '<pre class="out" id="outForms"></pre>'+
    '</div></details>';

  buildReview();
  refreshOutputs();

  document.getElementById("copyRow").onclick=function(){doCopy(buildTSV(),this,"1行コピー（スプレッドシート用）");};
  document.getElementById("copyForms").onclick=function(){doCopy(buildForms(),this,"Forms用テキストをコピー");};
  document.getElementById("resetBtn").onclick=reset;
  var ab=document.getElementById("appendBtn"); if(ab) ab.onclick=appendToSheet;
  document.getElementById("outRow").onclick=function(){selectEl(this);};
  document.getElementById("outForms").onclick=function(){selectEl(this);};
  resultEl.scrollIntoView({behavior:"smooth"});
}

function buildReview(){
  var host=document.getElementById("reviewBody");
  host.innerHTML=FIELDS.map(function(f){
    var estBadge=result.est.indexOf(f.key)>=0?'<span class="est">推定</span>':"";
    var head='<div class="fld"><label>'+esc(f.label)+estBadge+'</label>';
    if(f.type==="text"){
      var big=(f.key==="fact"||f.key==="insight");
      return head+(big?'<textarea rows="2" data-k="'+f.key+'">'+esc(result[f.key]||"")+'</textarea>':
        '<input type="text" data-k="'+f.key+'" value="'+esc(result[f.key]||"")+'">')+'</div>';
    }
    if(f.type==="single"){
      var opts=SINGLE[f.key].slice();
      var cur=result[f.key]||"";
      if(cur && opts.indexOf(cur)<0) opts.push(cur); // その他自由記述を選択肢化
      var sel='<select data-k="'+f.key+'">'+opts.map(function(o){
        return '<option'+(o===cur?" selected":"")+'>'+esc(o)+'</option>';}).join("")+'</select>';
      return head+sel+'</div>';
    }
    // multi
    var base=MULTI[f.key].slice();
    var chosen=result[f.key]||[];
    var extras=chosen.filter(function(v){return base.indexOf(v)<0;}); // その他自由記述
    var cbs='<div class="cbs" data-k="'+f.key+'">'+base.concat(extras).map(function(o){
      var on=chosen.indexOf(o)>=0?" on":"";
      return '<label class="cb'+on+'"><input type="checkbox" value="'+esc(o)+'"'+(chosen.indexOf(o)>=0?" checked":"")+'>'+esc(o)+'</label>';
    }).join("")+'</div>';
    return head+cbs+'</div>';
  }).join("");

  // 双方向反映
  host.querySelectorAll("select[data-k]").forEach(function(el){
    el.onchange=function(){result[el.getAttribute("data-k")]=el.value;refreshOutputs();};});
  host.querySelectorAll("input[data-k],textarea[data-k]").forEach(function(el){
    el.oninput=function(){result[el.getAttribute("data-k")]=el.value;refreshOutputs();};});
  host.querySelectorAll(".cbs").forEach(function(box){
    var k=box.getAttribute("data-k");
    box.querySelectorAll(".cb input").forEach(function(cb){
      cb.onchange=function(){
        cb.parentNode.classList.toggle("on",cb.checked);
        var arr=[];box.querySelectorAll(".cb input").forEach(function(c){if(c.checked)arr.push(c.value);});
        if(k==="values"&&arr.length>3){cb.checked=false;cb.parentNode.classList.remove("on");toast("価値は最大3つまでです");return;}
        result[k]=arr;refreshOutputs();
      };});
  });
}

function refreshOutputs(){
  var vf=document.getElementById("v_fact"), vi=document.getElementById("v_insight");
  if(vf) vf.textContent=result.fact||"—"; if(vi) vi.textContent=result.insight||"—";
  renderSummary();
  document.getElementById("outRow").textContent=buildTSV();
  document.getElementById("outForms").textContent=buildForms();
}

/* 人が読む用の見やすいサマリー（fact/insightは上部で表示済みなので分類項目のみ） */
function renderSummary(){
  var host=document.getElementById("summary"); if(!host) return;
  function estBadge(k){return result.est.indexOf(k)>=0?'<span class="sbadge">推定</span>':"";}
  function valSingle(v){return v?esc(v):'<span class="sval empty">—</span>';}
  function valMulti(a){a=a||[];return a.length?a.map(function(x){return '<span class="pill">'+esc(x)+'</span>';}).join(""):'<span class="sval empty">—</span>';}
  function row(label,valHtml,badge){
    return '<div class="srow"><div class="skey">'+esc(label)+(badge||"")+'</div><div class="sval">'+valHtml+'</div></div>';
  }

  var html="";
  // 立場
  html+='<div class="ssection">立場</div>';
  html+=row("職務", (role.job&&role.job.length)?role.job.map(function(x){return '<span class="pill">'+esc(x)+'</span>';}).join(""):'<span class="sval empty">未選択</span>');
  html+=row("関わる相手", valSingle(role.counterpart));

  // 状況
  html+='<div class="ssection">状況の分類</div>';
  html+=row("状態", valSingle(result.state), estBadge("state"));
  html+=row("タイミング", valSingle(result.timing), estBadge("timing"));
  html+=row("頻度", valSingle(result.frequency), estBadge("frequency"));
  html+=row("他現場でも", valSingle(result.elsewhere), estBadge("elsewhere"));
  html+=row("場面", valSingle(result.scene), estBadge("scene"));
  html+=row("把握経路", valSingle(result.how), estBadge("how"));

  // 領域・タグ
  html+='<div class="ssection">領域・関連タグ</div>';
  html+=row("領域が分かるか", valSingle(result.domain_known), estBadge("domain_known"));
  html+=row("業務領域", valMulti(result.domains), estBadge("domains"));
  if(result.dept) html+=row("部署・担当", valSingle(result.dept), estBadge("dept"));
  html+=row("関連要素", valMulti(result.factors), estBadge("factors"));
  html+=row("価値", valMulti(result.values), estBadge("values"));

  host.innerHTML=html;
}

function joinMulti(a){a=a||[];return a.length?a.join(";")+";":"";}
/* スプレッドシート列順の1行（タブ区切り） */
function buildTSV(){
  return [
    joinMulti(role.job), role.counterpart||"",
    result.fact||"", result.state||"", result.timing||"", result.frequency||"",
    result.elsewhere||"", result.scene||"", result.domain_known||"",
    joinMulti(result.domains), result.dept||"", joinMulti(result.factors),
    joinMulti(result.values), result.how||"", result.insight||"", ""
  ].join("\t");
}
/* Forms用の読みやすいテキスト */
function buildForms(){
  var L=[];
  L.push("職務: "+(role.job||[]).join("、"));
  L.push("関わる相手: "+(role.counterpart||""));
  FIELDS.forEach(function(f){
    var v=result[f.key];
    L.push(f.label+": "+(Array.isArray(v)?v.join("、"):(v||"")));
  });
  return L.join("\n");
}

/* ---------- スプレッドシート追記（GAS: mode=append） ---------- */
function appendToSheet(){
  var ab=document.getElementById("appendBtn"); ab.disabled=true; ab.textContent="送信中…"; showErr("");
  var payload={mode:"append",token:ACCESS_TOKEN,row:buildRowArray()};
  fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
    .then(function(r){return r.json();}).then(function(d){
      if(d.error) throw new Error(d.error);
      ab.textContent="反映しました ✓"; toast("スプレッドシートに反映しました");
    }).catch(function(e){
      ab.disabled=false; ab.textContent="スプレッドシートに反映";
      showErr("反映に失敗しました（"+e.message+"）。GAS側の append 対応をご確認ください。1行コピーで手動貼り付けも可能です。");
    });
}
/* 追記用に配列で渡す（TSVと同じ列順） */
function buildRowArray(){
  return [
    joinMulti(role.job), role.counterpart||"",
    result.fact||"", result.state||"", result.timing||"", result.frequency||"",
    result.elsewhere||"", result.scene||"", result.domain_known||"",
    joinMulti(result.domains), result.dept||"", joinMulti(result.factors),
    joinMulti(result.values), result.how||"", result.insight||"", ""
  ];
}

/* ---------- コピー ---------- */
function doCopy(txt,btn,label){
  function ok(){btn.textContent="コピーしました ✓";setTimeout(function(){btn.textContent=label;},1600);}
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(ok).catch(function(){legacy(txt,ok);});}
  else legacy(txt,ok);
}
function legacy(txt,ok){
  try{var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.focus();ta.select();var d=document.execCommand("copy");document.body.removeChild(ta);
    if(d){ok();return;}}catch(e){}
  showErr("自動コピーがブロックされました。枠内を全選択してコピーしてください。");
}
function selectEl(el){try{var r=document.createRange();r.selectNodeContents(el);var s=window.getSelection();s.removeAllRanges();s.addRange(r);}catch(e){}}

/* ---------- リセット ---------- */
function reset(){
  messages=[{role:"assistant",content:GREETING}]; done=false; result=null;
  resultEl.style.display="none"; resultEl.innerHTML="";
  inputbar.style.display="block";
  inputbar.innerHTML='<div class="inputrow"><textarea id="msg" rows="5" placeholder="ここに入力（Enterで送信 / Shift+Enterで改行）"></textarea>'+
    '<button class="btn primary" id="send">送信</button></div>'+
    '<div class="meta"><span>「特になし」でも大丈夫です</span>'+
    '<button class="link" id="finishLink">もう十分／まとめる →</button></div>';
  bindInput(); showErr(""); renderChat();
}

/* 「まとめる」押下時：即打ち切らず、AIに締めの一言を返させてから完了状態へ */
function wrapUp(){
  if(done) return;
  if(!messages.some(function(m){return m.role==="user";})) return; // まだ何も話していない
  showErr("");
  if(finishLink){finishLink.disabled=true;}
  if(sendBtn){sendBtn.disabled=true;}
  showTyping("お話をまとめています…");
  var closeSys=CHAT_SYSTEM+"\n\n【最重要・今回のターン】ユーザーが会話の終了を希望しました。ここで会話を締めてください。新しい質問は絶対にしないこと。ここまで話してくれた内容へのお礼とねぎらいを1〜2文だけ述べ、メッセージの末尾に __DONE__ を付けてください。";
  callAPI("chat",closeSys,messages.map(function(m){return {role:m.role,content:m.content};}))
    .then(function(reply){
      hideTyping();
      messages.push({role:"assistant",content:reply.replace(/__DONE__/g,"").trim()});
      renderChat();
      enterDone();
    }).catch(function(e){
      hideTyping();
      if(finishLink){finishLink.disabled=false;}
      if(sendBtn){sendBtn.disabled=false;}
      showErr("通信に失敗しました（"+e.message+"）。少し待って再度お試しください。");
    });
}

function bindInput(){
  msgEl=document.getElementById("msg"); sendBtn=document.getElementById("send"); finishLink=document.getElementById("finishLink");
  sendBtn.onclick=send;
  msgEl.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
  finishLink.onclick=wrapUp;
  msgEl.focus();
}

initRole(); bindInput(); renderChat();
</script>
</body>
</html>
